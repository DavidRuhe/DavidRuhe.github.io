title: David Ruhe
email: d.ruhe@uva.nl
description: >- # this means to ignore newlines until "baseurl:"
  David Ruhe - Ph.D. Student at the University of Amsterdam
about: >-
  I am a fourth-year Ph.D. student in the <a href="http://amlab.science.uva.nl">Amsterdam Machine Learning Lab (AMLab)</a> and the <a href="https://ai4science-amsterdam.github.io">AI4Science</a> lab of the University of Amsterdam. 
  I have also interned at <a href="https://deepmind.google">Google Deepmind</a>, <a href="https://www.microsoft.com/en-us/research/lab/microsoft-research-ai4science/">Microsoft Research (AI4Science)</a>, and the <a href="https://www.simonsfoundation.org">Simon's Foundation's Flatiron Institute</a>. 
  My research interests include (3D) geometric deep learning, AI4Science, computer vision, generative models and time-series, often working at an intersection of these.
  In particular, I have published several works on using the <a href="https://en.wikipedia.org/wiki/Geometric_algebra">Geometric Algebra</a> in deep learning architectures.
